name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 2>&1 | tee install-log.txt
        continue-on-error: false

      - name: Install summary
        if: always()
        run: |
          echo "=== pip install result ==="
          tail -20 install-log.txt || echo "no install log"

      - name: Run tests
        run: |
          set -o pipefail
          python -m pytest tests/ -v -m "not integration" --tb=short 2>&1 | tee test-output.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-output.txt
          retention-days: 14
